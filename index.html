<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Le BuRonan — Fiche de contact</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f0f0f;
            color: #f0f0f0;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 20px 0 60px;
        }

        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        .header .icon {
            font-size: 56px;
            margin-bottom: 12px;
        }

        .header h1 {
            font-size: 26px;
            font-weight: 700;
            color: #ffffff;
        }

        .header p {
            font-size: 14px;
            color: #888;
            margin-top: 6px;
        }

        .section {
            background: #1c1c1e;
            border-radius: 14px;
            padding: 20px;
            margin-bottom: 16px;
        }

        .section-title {
            font-size: 13px;
            font-weight: 600;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .field {
            margin-bottom: 14px;
        }

        .field:last-child { margin-bottom: 0; }

        .field label {
            display: block;
            font-size: 12px;
            color: #888;
            margin-bottom: 6px;
        }

        .field input,
        .field select {
            width: 100%;
            background: #2c2c2e;
            border: 1px solid #3a3a3c;
            border-radius: 10px;
            padding: 12px 14px;
            color: #ffffff;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
            -webkit-appearance: none;
        }

        .field input:focus,
        .field select:focus {
            border-color: #0a84ff;
        }

        .field input::placeholder { color: #555; }

        .field select option { background: #2c2c2e; }

        .btn-submit {
            width: 100%;
            background: #0a84ff;
            color: white;
            border: none;
            border-radius: 14px;
            padding: 16px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
            transition: opacity 0.2s, transform 0.1s;
        }

        .btn-submit:hover { opacity: 0.9; }
        .btn-submit:active { transform: scale(0.98); }
        .btn-submit:disabled { opacity: 0.4; cursor: not-allowed; }

        .success {
            display: none;
            text-align: center;
            padding: 40px 20px;
        }

        .success .check { font-size: 64px; margin-bottom: 16px; }
        .success h2 { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
        .success p { color: #888; font-size: 15px; }

        .error-msg {
            color: #ff453a;
            font-size: 13px;
            margin-top: 8px;
            display: none;
        }

        .required { color: #0a84ff; }
    </style>
</head>
<body>
    <div class="container">

        <div class="header">
            <div class="icon">🎬</div>
            <h1>Le BuRonan</h1>
            <p>Remplis ta fiche de contact</p>
        </div>

        <div id="form-content">

            <!-- Identité -->
            <div class="section">
                <div class="section-title">👤 Identité</div>

                <div class="field">
                    <label>Prénom <span class="required">*</span></label>
                    <input type="text" id="prenom" placeholder="Ton prénom" autocomplete="given-name">
                </div>

                <div class="field">
                    <label>Nom <span class="required">*</span></label>
                    <input type="text" id="nom" placeholder="Ton nom" autocomplete="family-name">
                </div>

                <div class="field">
                    <label>Métier <span class="required">*</span></label>
                    <select id="categorie">
                        <option value="">Choisis ton métier...</option>
                        <option value="Réalisateur">Réalisateur</option>
                        <option value="Acteur">Acteur</option>
                        <option value="Technicien">Technicien</option>
                        <option value="Producteur">Producteur</option>
                        <option value="Compositeur">Compositeur</option>
                        <option value="Agent">Agent</option>
                        <option value="Studio">Studio</option>
                        <option value="Client">Client</option>
                        <option value="Autre">Autre</option>
                    </select>
                </div>

                <div class="field">
                    <label>Rôle / Spécialité</label>
                    <input type="text" id="role" placeholder="Ex: Chef opérateur, Monteur...">
                </div>
            </div>

            <!-- Contact -->
            <div class="section">
                <div class="section-title">📞 Contact</div>

                <div class="field">
                    <label>Téléphone</label>
                    <input type="tel" id="telephone" placeholder="+33 6 00 00 00 00" autocomplete="tel">
                </div>

                <div class="field">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="ton@email.com" autocomplete="email">
                </div>
            </div>

            <!-- Réseaux sociaux -->
            <div class="section">
                <div class="section-title">🌐 Réseaux sociaux</div>

                <div class="field">
                    <label>Instagram</label>
                    <input type="text" id="instagram" placeholder="@username">
                </div>

                <div class="field">
                    <label>LinkedIn</label>
                    <input type="text" id="linkedin" placeholder="Profil LinkedIn">
                </div>

                <div class="field">
                    <label>IMDb</label>
                    <input type="text" id="imdb" placeholder="Profil IMDb">
                </div>
            </div>

            <p class="error-msg" id="error-msg">⚠️ Merci de remplir au moins le prénom, le nom et le métier.</p>

            <button class="btn-submit" id="btn-submit" onclick="submitForm()">
                ✅ Envoyer ma fiche
            </button>

        </div>

        <!-- Succès -->
        <div class="success" id="success">
            <div class="check">✅</div>
            <h2>Fiche envoyée !</h2>
            <p>Tes informations ont bien été reçues.<br>Merci !</p>
        </div>

    </div>

    <script>
        const SUPABASE_URL = 'https://pwainatlfilxrzlrphqo.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB3YWluYXRsZmlseHJ6bHJwaHFvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2NjYzMzcsImV4cCI6MjA5NDI0MjMzN30.WtPX3GhYWgTRmAr-Kgk6hUyO-TH0QLMYRs3OR-iX2GU';

        async function submitForm() {
            const prenom = document.getElementById('prenom').value.trim();
            const nom = document.getElementById('nom').value.trim();
            const categorie = document.getElementById('categorie').value;

            // Validation
            if (!prenom || !nom || !categorie) {
                document.getElementById('error-msg').style.display = 'block';
                return;
            }

            document.getElementById('error-msg').style.display = 'none';
            const btn = document.getElementById('btn-submit');
            btn.disabled = true;
            btn.textContent = '⏳ Envoi en cours...';

            const data = {
                prenom: prenom,
                nom: nom,
                categorie: categorie,
                role: document.getElementById('role').value.trim(),
                telephone: document.getElementById('telephone').value.trim(),
                email: document.getElementById('email').value.trim(),
                instagram: document.getElementById('instagram').value.trim(),
                linkedin: document.getElementById('linkedin').value.trim(),
                imdb: document.getElementById('imdb').value.trim(),
                lu: false
            };

            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/formulaire`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`,
                        'Prefer': 'return=minimal'
                    },
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    document.getElementById('form-content').style.display = 'none';
                    document.getElementById('success').style.display = 'block';
                } else {
                    const err = await response.text();
                    btn.disabled = false;
                    btn.textContent = '✅ Envoyer ma fiche';
                    alert('Erreur : ' + err);
                }
            } catch (e) {
                btn.disabled = false;
                btn.textContent = '✅ Envoyer ma fiche';
                alert('Erreur réseau : ' + e.message);
            }
        }
    </script>
</body>
</html>
